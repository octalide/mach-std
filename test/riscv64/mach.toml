[project]
id      = "rvprobe"
name    = "rvprobe"
version = "0.0.0"
src     = "src"
dep     = "dep"
target  = "linux-riscv64"
out     = "out/{target}/{name}{ext}"
obj     = "out/{target}/obj"

[target.linux-riscv64]
isa = "riscv64"
os  = "linux"
abi = "lp64"

[profile.debug]
opt = 0

[bin.rvprobe]
entry = "main.mach"

[deps.std]
path = "dep/std"
