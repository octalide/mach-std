[project]
id = "std"
name = "Mach Standard Library"
version = "0.2.5"
dir_src = "src"
dir_out = "out"
dir_tests = "tests"
dir_dep = "dep"
target = "native"

[targets.linux]
os = "linux"
isa = "x86_64"
abi = "sysv64"
mode = "library"
entrypoint = "lib.mach"
artifacts = "linux"
binary = "linux/bin/libmachstd.a"
